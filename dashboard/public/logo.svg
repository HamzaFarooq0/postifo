<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35"/>
      <stop offset="100%" style="stop-color:#FFBE0B"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="128" height="128" rx="28" fill="#0A0A0A"/>

  <!-- Stylized "fo" lettermark -->
  <!-- The "f" - a clean, modern lowercase f with a horizontal crossbar that extends into the "o" -->
  <text x="22" y="96" font-family="Inter, -apple-system, sans-serif" font-size="80" font-weight="800" fill="url(#grad1)" letter-spacing="-4">fo</text>

  <!-- Small dot/spark above the f - like a cursor/spark of insight -->
  <circle cx="38" cy="24" r="6" fill="url(#grad1)"/>
</svg>