version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: linkedlens-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: linkedlens
    ports:
      - '5432:5432'
    volumes:
      - linkedlens_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  linkedlens_pgdata:
